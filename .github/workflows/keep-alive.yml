name: Keep Render Service Awake

on:
  schedule:
    # Runs every 14 minutes 24/7 to prevent Render free service from sleeping (15-min inactivity timeout)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send HTTP Ping to DevAssist Render URL
        run: |
          echo "Pinging https://devassist-f8tp.onrender.com to keep service warm..."
          curl -s -L --max-time 30 -o /dev/null -w "HTTP Status: %{http_code}\n" https://devassist-f8tp.onrender.com || echo "Ping request completed with timeout/error, server waking up."
